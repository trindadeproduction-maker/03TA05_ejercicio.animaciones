<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>animaciones</title>
    <style>
        .body{
            background-color: black;
        }
        .box {
            width: 100px;
            height: 100px;
            background-color: blue;
            transition: background-color 0. 3s ease;
            transition: width 0. 1s ease;
            transition: height 0. 1 ease;
        }

        .box:hover {
            background-color: brown;
            width: 200px;
            height: 200px;
        }

        .box2 {
            width: 100px;
            height: 100px;
            background-color: rgb(255, 242, 0);
            transition: background-color 0. 3s ease;
            transition: width 0.5s ease;
            transition: height 0.5s ease;
        }

        .box2:hover {
            transform: scale(1.5) rotate(-45deg);
            background-color: blueviolet;
            border-radius: 30%;
        }

                .box3 {
            width: 100px;
            height: 100px;
            background-color: rgb(255, 38, 0);
            animation: box3 0.3s infinite ease-in-out;
        }
            /*.box3:hover {
            width: 100px;
            height: 100px;
            background-color: antiquewhite; 
        }  */
        @keyframes animacionbox3{
            0%{
                transform: translate(0, 0) scale(1.5) rotate(0 deg);
                background-color: aliceblue;
            }
            25%{
                transform: translate(0, 0) scale(1.5) rotate(0 deg);
                background-color: rgb(172, 202, 228);
            }
            50%{
                transform: translate(0, 0) scale(1.5) rotate(0 deg);
                background-color: rgb(30, 67, 99);
            }
        }
    </style>
</head>

<body>
    <div class="box"></div>
    <div class="box2"></div>
    <div class="box3"></div>
</body>

</html>
