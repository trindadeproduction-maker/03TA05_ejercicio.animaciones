<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>animation snake</title>
    <style>
        .body{
            align-items: center;
            justify-items: center;
            font-family: Arial, sans-serif;
            display: flex;
            margin: 0;
            min-height: 100vh;
            animation: fondo 5s infinite alternate;
        }
        @keyframes fondo{
            from {background: black;}
            to {background: white;}
        }
        /* NIVEL 1 — Animación básica (fade + slide) Aparezca desde arriba Con efecto fade (opacidad) */
        .container {
            text-align: center;
            padding: 32px;
            border-radius: 20%;
            background-color: brown;
            box-shadow: 0 12px 30px color( rgb(0, 0, 0) rgb(0, 0, 0) blue);
            -webkit-animation: fade-in-top 0.6s cubic-bezier(0.390, 0.575, 0.565, 1.000) both;
            animation: fade-in-top 0.6s cubic-bezier(0.390, 0.575, 0.565, 1.000) both;
        }

        @-webkit-keyframes fade-in-top {
            0% {
                -webkit-transform: translateY(-50px);
                transform: translateY(-50px);
                opacity: 0;
            }

            100% {
                -webkit-transform: translateY(0);
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fade-in-top {
            0% {
                -webkit-transform: translateY(-50px);
                transform: translateY(-50px);
                opacity: 0;
            }

            100% {
                -webkit-transform: translateY(0);
                transform: translateY(0);
                opacity: 1;
            }
        }


        .Titulo {
            animation: fade-in-top ;
            animation-delay: 1s;
        }

        .sbutitulo {
            animation: fade-in-top ;
            animation-delay: 1s;
        }

        .btn-test {
            -webkit-animation: pulsate-fwd 2s ease-in-out infinite both;
            animation: pulsate-fwd 2s ease-in-out infinite both;
            border: none;
            border: 999px;
            animation-delay: 1s;
            cursor: pointer;
            /* opacity: 0; */
        }
        .btn:hover{
            transition: background-color #000;
        }
        @-webkit-keyframes pulsate-fwd {
            0% {
                -webkit-transform: scale(1);
                transform: scale(1);
            }

            50% {
                -webkit-transform: scale(1.1);
                transform: scale(1.1);
            }

            100% {
                -webkit-transform: scale(1);
                transform: scale(1);
            }
        }

        @keyframes pulsate-fwd {
            0% {
                -webkit-transform: scale(1);
                transform: scale(1);
            }

            50% {
                -webkit-transform: scale(1.1);
                transform: scale(1.1);
            }

            100% {
                -webkit-transform: scale(1);
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 class="Titulo">Escape Room</h1>
        <p class="subtitulo">¿Will you get out?</p>
        <button class="btn-test">Enter</button>
    </div>
</body>

</html>
